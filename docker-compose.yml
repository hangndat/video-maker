# App orchestrator; optional Redis + n8n with profile `full`.
services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATA_ROOT: /data
      # NDJSON log on the shared volume: host ./shared_data/logs/app.jsonl
      LOG_FILE: /data/logs/app.jsonl
    volumes:
      - ./shared_data:/data

  redis:
    image: redis:7-alpine
    profiles:
      - full
    ports:
      - "6379:6379"

  n8n:
    image: n8nio/n8n:latest
    profiles:
      - full
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: {}
